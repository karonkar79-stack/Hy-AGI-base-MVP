services:
  # Backend API
  - type: web
    name: hyagi-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://hyagi-mvp.vercel.app
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
